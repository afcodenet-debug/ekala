# Render Infrastructure as Code
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: ekala-api
    runtime: node
    plan: starter          # change to standard if you need more RAM/CPU
    region: frankfurt      # or oregon, ohio, etc.

    # Monorepo settings
    rootDir: .

    buildCommand: npm ci --omit=dev && npm run build:render
    startCommand: node dist/server/server/server.js


    # Node version (Render supports 20/22 well for better-sqlite3)
    # You can also set this in the dashboard under "Settings > Environment"
    # nodeVersion: 20.18.0

    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://ekala.vercel.app
      - key: ENABLE_SUPABASE_SYNC
        value: "false"
      # === CRITICAL: Force cloud mode to use Supabase (SQLite won't work reliably on Render) ===
      - key: RENDER_CLOUD_MODE
        value: "true"
      # === Supabase Pull Sync Configuration (for future local development) ===
      - key: ENABLE_SUPABASE_PULL
        value: "false"  # Disabled in cloud mode (uses Supabase directly)
      - key: SUPABASE_URL
        value: https://pwxlnshtotpagsyqegiz.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3eGxuc2h0b3RwYWdzeXFlZ2l6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODY4NzcwNywiZXhwIjoyMDk0MjYzNzA3fQ.PqQv8AcjNKiMHZHnCDTZMQEhoXAcSs8faE2IaI2SLjI
      - key: SUPABASE_PULL_INTERVAL_MS
        value: "8000"
      - key: SUPABASE_PULL_LOOKBACK_MIN
        value: "120"
      # === Supabase as source of truth for all data in cloud mode ===
      - key: USE_SUPABASE_PRODUCTS
        value: "true"
      - key: USE_SUPABASE_TABLES
        value: "true"
      - key: USE_SUPABASE_ORDERS
        value: "true"
      # Persistent disk still needed for uploads + any legacy tables not yet migrated
      - key: DATA_DIR
        value: /opt/render/project/src/data

    # Persistent disk for SQLite + uploads (CRITICAL for SQLite)
    disk:
      name: great-olive-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5

    # Health check (already implemented in server.ts)
    healthCheckPath: /health

    # Auto-deploy on push to main
    autoDeploy: true
